apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-vs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kevnlab/k8s.git
    targetRevision: main
    path: argocd/nginx-vs
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy: {}   # 留空 = 手动同步，先观察
